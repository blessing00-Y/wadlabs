<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>HTML Tables 101</title>
    </head>
    <body>
        <section id="simple-table">
            <h2>Simple Table</h2>
            <table border="1">
                <tr>
                    <th>Adm. no</th>
                    <th>Name</th>
                </tr>
                <tr>
                    <td>2024</td>
                    <td>Blessing Yula</td>
                </tr>
                <tr>
                    <td>2034</td>
                    <td>Michael Miloki</td>
                </tr>
            </table>
        </section>
        <section id="course-table">
            <h2>Course Table</h2>
            <table border="1">
                <!--- the table heading region-->
              <thead>
                <!--- the table row-->
                <tr>
                    <!--- the table heading cell-->
                    <th>Semester</th>
                    <th colspan="2">Course</th>
                </tr>
                <tr>
                    <th>Fall 2024</th>
                    <th>BBIT 1</th>
                    <th>BBIT 2</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                    <td rowspan="3">1</td>
                        <td>Prog</td>
                        <td>OOP</td>
                    </tr>
                    <tr>
                        <td>DB</td>
                        <td>WAD</td>
                    </tr>
                    <tr>
                        <td>Ethics</td>
                        <td>PA</td>
                </tr>
                 
              </tbody>
            </table>
        </section>
    </body>
</html>
